name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-complexity=10 --max-line-length=120 --statistics

    - name: Build Docker containers for test database
      run: docker-compose -f docker-compose-test.yml build

    - name: Start services with Docker Compose
      run: docker-compose -f docker-compose-test.yml up -d db

    - name: Make wait-for-it executable
      run: chmod +x wait-for-it.sh

    - name: Wait for PostgreSQL to be ready
      run: ./wait-for-it.sh localhost:5432 --timeout=60

    - name: Run tests with pytest
      env:
        PYTHONPATH: .
        DATABASE_URL: postgresql://user:password@localhost:5432/testdb
        PGDATABASE: testdb
      run: pytest app/tests/test_api.py

    - name: Stop services with Docker Compose
      if: always()
      run: docker-compose -f docker-compose-test.yml down
